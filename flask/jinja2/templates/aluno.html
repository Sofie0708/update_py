{% extends 'base.html' %}

{% block title %}
Lista de Alunos
{% endblock %}

{% block content %}

<h2>Lista de Alunos</h2>

<ul>
    {% for aluno in alunos %}
    <li>
        {{ aluno.nome }} - Nota: {{ aluno.nota }}

        {% if aluno.nota >= 7 %}
        Aprovado
        {% else %}
        Reprovado
        {% endif %}

    </li>
    {% endfor %}
</ul>

{% endblock %}
